<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Job Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #333; }
    nav { background: #1a1a2e; padding: 14px 24px; display: flex; align-items: center; gap: 20px; }
    nav a { color: #fff; text-decoration: none; font-size: 14px; opacity: .8; }
    nav a:hover { opacity: 1; }
    nav .brand { font-size: 16px; font-weight: 600; opacity: 1; margin-right: auto; }
    .container { max-width: 860px; margin: 32px auto; padding: 0 20px; }
    .btn { display: inline-block; padding: 8px 18px; border-radius: 6px; font-size: 13px; cursor: pointer; border: none; text-decoration: none; }
    .btn-primary { background: #1a1a2e; color: #fff; }
    .btn-primary:hover { background: #16213e; }
    .btn-sm { padding: 4px 12px; font-size: 12px; }
    .status { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
    .status-Applied    { background: #dbeafe; color: #1e40af; }
    .status-OA         { background: #fef3c7; color: #92400e; }
    .status-Interview  { background: #e0e7ff; color: #3730a3; }
    .status-Offer      { background: #dcfce7; color: #166534; }
    .status-Rejected   { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="brand">Job Tracker</a>
    <a href="/">All Applications</a>
    <a href="/add">+ Add New</a>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
